[alembic]
# Path to the migration scripts directory, relative to this file.
script_location = schemas/postgres

# Prepend the project root to sys.path so that `libs` is importable.
prepend_sys_path = .

# Migration file naming: NNNN_slug.py
file_template = %%(rev)s_%%(slug)s

# Timezone for timestamps in generated migration files.
timezone = UTC

# Maximum length of the slug component in the filename.
truncate_slug_length = 60

# Logging configuration.
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

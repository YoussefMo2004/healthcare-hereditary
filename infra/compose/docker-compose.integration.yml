services:
  postgres:
    image: postgres:15-alpine
    container_name: healthcare_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-healthcare_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
      POSTGRES_DB: ${POSTGRES_DB:-healthcare}
    ports:
      - "5432:5432"
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-healthcare_app}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - healthcare

  redis:
    image: redis:7-alpine
    container_name: healthcare_redis
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-change_me}
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-change_me}
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli -a ${REDIS_PASSWORD:-change_me} ping | grep PONG']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - redis_data:/data
    networks:
      - healthcare

  neo4j:
    image: neo4j:5-community
    container_name: healthcare_neo4j
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-change_me}
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7687:7687"
      - "7474:7474"
    healthcheck:
      test: ['CMD-SHELL', 'cypher-shell -u ${NEO4J_USER:-neo4j} -p ${NEO4J_PASSWORD:-change_me} "RETURN 1" || exit 1']
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 15s
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - healthcare

  minio:
    image: minio/minio:latest
    container_name: healthcare_minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-change_me}
    ports:
      - "9000:9000"
      - "9001:9001"
    command: minio server /data --console-address ":9001"
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 15s
    volumes:
      - minio_data:/data
    networks:
      - healthcare

  minio-init:
    image: minio/mc:latest
    container_name: healthcare_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set minio http://minio:9000 ${MINIO_ACCESS_KEY:-minioadmin} ${MINIO_SECRET_KEY:-change_me};
      mc mb -p minio/mlflow-artifacts || exit 0;
      exit 0;
      "
    networks:
      - healthcare

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.0
    container_name: healthcare_mlflow
    environment:
      MLFLOW_TRACKING_URI: http://0.0.0.0:5000
      MLFLOW_BACKEND_STORE_URI: sqlite:///mlflow.db
      AWS_ACCESS_KEY_ID: ${MINIO_ACCESS_KEY:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_SECRET_KEY:-change_me}
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
    ports:
      - "5000:5000"
    depends_on:
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    command: >
      mlflow server
      --backend-store-uri sqlite:///mlflow.db
      --default-artifact-root s3://mlflow-artifacts
      --host 0.0.0.0
      --port 5000
    healthcheck:
      test: ['CMD-SHELL', 'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:5000/health'')" || exit 1']
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - healthcare

  api:
    build:
      context: ../..
      dockerfile: infra/docker/api.Dockerfile
    container_name: healthcare_api
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
      mlflow:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_LOG_LEVEL: INFO
      APP_SECRET_KEY: ${APP_SECRET_KEY:-change_me_app_secret_32chars_min}
      AWS_ACCESS_KEY_ID: ${MINIO_ACCESS_KEY:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_SECRET_KEY:-change_me}
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MODEL_NAME: hereditary-risk-xgboost
      MODEL_STAGE: Staging
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-change_me}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      POSTGRES_DB: ${POSTGRES_DB:-healthcare}
      POSTGRES_HOST: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-healthcare_app}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-change_me}
      REDIS_PORT: "6379"
      ENABLE_SYMPTOM_MODEL: "false"
    ports:
      - "8000:8000"
    healthcheck:
      test: ['CMD-SHELL', 'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:8000/health'')" || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s
    restart: unless-stopped
    networks:
      - healthcare

volumes:
  postgres_data:
  redis_data:
  neo4j_data:
  neo4j_logs:
  minio_data:
  mlflow_data:

networks:
  healthcare:
    driver: bridge

# SECRET TEMPLATE — values are base64-encoded placeholders.
# In production, populate this via:
#   - External Secrets Operator (AWS Secrets Manager / Vault)
#   - Sealed Secrets
#   - CI/CD pipeline (never commit with real values)
#
# Generate base64: echo -n 'value' | base64
apiVersion: v1
kind: Secret
metadata:
  name: healthcare-api-secrets
  namespace: healthcare
  labels:
    app: healthcare-api
type: Opaque
data:
  # PostgreSQL — sourced from terraform rds-credentials secret in production
  POSTGRES_HOST: REPLACE_BASE64
  POSTGRES_PORT: NTQzMg==    # 5432
  POSTGRES_DB: aGVhbHRoY2FyZQ==  # healthcare
  POSTGRES_USER: REPLACE_BASE64
  POSTGRES_PASSWORD: REPLACE_BASE64

  # Neo4j
  NEO4J_URI: REPLACE_BASE64
  NEO4J_USER: REPLACE_BASE64
  NEO4J_PASSWORD: REPLACE_BASE64

  # Redis — sourced from terraform redis-credentials secret in production
  REDIS_HOST: REPLACE_BASE64
  REDIS_PORT: NjM3OQ==  # 6379
  REDIS_PASSWORD: REPLACE_BASE64

  # MinIO / S3
  MINIO_ACCESS_KEY: REPLACE_BASE64
  MINIO_SECRET_KEY: REPLACE_BASE64
  AWS_ACCESS_KEY_ID: REPLACE_BASE64
  AWS_SECRET_ACCESS_KEY: REPLACE_BASE64

  # App secrets
  APP_SECRET_KEY: REPLACE_BASE64
  JWT_SECRET_KEY: REPLACE_BASE64
  ENCRYPTION_KEY: REPLACE_BASE64

  # MLflow S3 endpoint
  MLFLOW_S3_ENDPOINT_URL: REPLACE_BASE64

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: healthcare-api
  namespace: healthcare
  labels:
    app: healthcare-api
  annotations:
    # AWS Load Balancer Controller — creates an ALB
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"

    # TLS — reference an ACM certificate ARN
    # alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-east-1:ACCOUNT:certificate/CERT_ID

    # Security headers
    alb.ingress.kubernetes.io/security-policy: ELBSecurityPolicy-TLS13-1-2-2021-06

    # Health check
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "15"
    alb.ingress.kubernetes.io/healthy-threshold-count: "2"
    alb.ingress.kubernetes.io/unhealthy-threshold-count: "3"

    # WAF (optional — replace with your WAF ACL ARN)
    # alb.ingress.kubernetes.io/wafv2-acl-arn: arn:aws:wafv2:us-east-1:ACCOUNT:regional/webacl/NAME/ID
spec:
  rules:
    - host: api.healthcare-internal.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: healthcare-api
                port:
                  name: http

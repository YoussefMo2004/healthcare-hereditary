# Prometheus scrape configuration for the Healthcare Prediction System.
#
# Targets:
#   healthcare-api   FastAPI app at /metrics (via PrometheusMetricsMiddleware)
#   mlflow           MLflow tracking server (built-in /metrics endpoint)
#
# Alerting rules are in alerts.yml (loaded via rule_files below).
# Alerts fire to Alertmanager — configure alertmanager.yml separately.

global:
  scrape_interval:     15s   # how often to scrape each target
  evaluation_interval: 15s   # how often to evaluate alerting rules
  scrape_timeout:      10s

  # Attach these labels to every time series scraped from this Prometheus
  external_labels:
    environment: "${APP_ENV:-development}"
    system: "healthcare-prediction"

# Alerting configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "alertmanager:9093"

# Load alert rules
rule_files:
  - "alerts.yml"

# Scrape configurations
scrape_configs:

  # ── Healthcare Prediction API ───────────────────────────────────────────────
  - job_name: "healthcare-api"
    scrape_interval: 15s
    static_configs:
      - targets: ["api:8000"]
        labels:
          service: "healthcare-api"
    metrics_path: "/metrics"
    # No auth — /metrics endpoint is firewalled to internal network only

  # ── MLflow Tracking Server ──────────────────────────────────────────────────
  - job_name: "mlflow"
    scrape_interval: 30s
    static_configs:
      - targets: ["mlflow:5000"]
        labels:
          service: "mlflow"
    metrics_path: "/metrics"

  # ── Prometheus self-monitoring ──────────────────────────────────────────────
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          service: "prometheus"
